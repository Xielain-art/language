name: Deploy Bot to VPS

on:
  push:
    branches:
      - main # Запускаем деплой только при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.WORK_DIR }}

            # Обновляем код из репозитория
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # Пересобираем и запускаем Docker (Caddy + Bot)
            sudo docker-compose up -d --build

            # Чистим старые образы (важно для VPS с небольшим диском)
            sudo docker image prune -f
